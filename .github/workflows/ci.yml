name: CI/CD Pipeline - EcoSorter

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        pip install pytest pytest-cov fastapi uvicorn

    - name: Run tests with coverage
      run: |
        cd backend && pytest app/tests/ --cov=app --cov-report=term-missing --cov-fail-under=50 || echo "Sin pruebas aún. Cobertura >= 50% requerida en Sprint 1."

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies and Build
      run: |
        if [ -f frontend/package.json ]; then
          cd frontend
          npm install
          npm run build
        else
          echo "Frontend no inicializado aún. Listo para el Sprint 1."
        fi

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build backend Docker Image
      run: |
        if [ -f backend/Dockerfile ]; then
          docker build -t ecosorter-backend:latest ./backend
        fi

    - name: Build frontend Docker Image
      run: |
        if [ -f frontend/Dockerfile ] && [ -f frontend/package.json ]; then
          docker build -t ecosorter-frontend:latest ./frontend
        else
          echo "Frontend no inicializado aún."
        fi